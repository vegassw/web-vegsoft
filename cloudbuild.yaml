steps:
  # Build and push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'REACT_APP_BACKEND_URL=${_BACKEND_URL}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vegsoft-solutions:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vegsoft-solutions:latest'
      - '.'

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vegsoft-solutions:$COMMIT_SHA']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vegsoft-solutions:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vegsoft-solutions'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vegsoft-solutions:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET},BACKEND_URL=${_BACKEND_URL},FRONTEND_URL=${_FRONTEND_URL}'

substitutions:
  _BACKEND_URL: 'https://vegsoft-solutions-xxxxxxxx-uc.a.run.app'
  _FRONTEND_URL: 'https://vegsoft-solutions-xxxxxxxx-uc.a.run.app'
  _GOOGLE_CLIENT_ID: '307650209341-kvouf5s47s16po759u0d70sc5lntmcee.apps.googleusercontent.com'
  _GOOGLE_CLIENT_SECRET: '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'

images:
  - 'gcr.io/$PROJECT_ID/vegsoft-solutions:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/vegsoft-solutions:latest'

options:
  logging: CLOUD_LOGGING_ONLY
